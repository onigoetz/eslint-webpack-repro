name: Node CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: "🏗️ Build & Test"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v6
    - name: ⬢ Setup Node.js 22.x
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22.x
    - name: 📦 Install dependencies
      run: npm install
    - name: 🔨 Build
      run: npm build
